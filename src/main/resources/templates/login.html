<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>로그인</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header>
    <h1><a th:href="@{/questions}">⚖️ 밸런스 게임</a></h1>
</header>

<h2>로그인</h2>

<p th:if="${param.error}" class="error">아이디 또는 비밀번호가 올바르지 않습니다.</p>
<p th:if="${param.logout}" class="muted">로그아웃되었습니다.</p>

<form th:action="@{/login}" method="post">
    <label>아이디</label>
    <input type="text" name="username" autofocus>
    <label>비밀번호</label>
    <input type="password" name="password">
    <button type="submit" class="btn">로그인</button>
</form>

<p class="muted">계정이 없나요? <a th:href="@{/signup}">회원가입</a></p>
</body>
</html>
