<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 · 밸런스 게임</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@1.3.9/dist/web/static/pretendard.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">
    <div class="auth-wrap">
        <a class="auth-brand" th:href="@{/questions}">
            <span class="brand-logo">B</span>
            <span class="brand-name">balance</span>
        </a>

        <div class="panel">
            <h2>로그인</h2>
            <p class="panel-sub">다시 오신 걸 환영해요.</p>

            <p th:if="${param.error}" class="flash">아이디 또는 비밀번호가 올바르지 않습니다.</p>
            <p th:if="${param.logout}" class="panel-sub" style="margin-bottom:16px">로그아웃되었습니다.</p>

            <form th:action="@{/login}" method="post">
                <div class="field">
                    <label>아이디</label>
                    <input type="text" name="username" autofocus placeholder="아이디">
                </div>
                <div class="field">
                    <label>비밀번호</label>
                    <input type="password" name="password" placeholder="비밀번호">
                </div>
                <button type="submit" class="btn-primary btn-block">로그인</button>
            </form>
        </div>

        <p class="auth-foot">계정이 없나요? <a th:href="@{/signup}">회원가입</a></p>
    </div>
</div>
</body>
</html>
