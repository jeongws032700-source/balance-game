<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>질문 만들기 · 밸런스 게임</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@1.3.9/dist/web/static/pretendard.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav th:replace="~{fragments/nav :: topnav}"></nav>

<div class="container">
    <div class="form-wrap">
        <a class="back-link" th:href="@{/questions}">← 목록으로</a>

        <div class="panel">
            <h2>질문 만들기</h2>
            <p class="panel-sub">사람들이 고민할 양자택일을 등록해보세요.</p>

            <form th:action="@{/questions}" th:object="${questionForm}" method="post">
                <div class="field">
                    <label>질문 제목</label>
                    <input type="text" th:field="*{title}" placeholder="예: 평생 하나만 먹어야 한다면?">
                    <p class="err" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></p>
                </div>
                <div class="field">
                    <label>선택지 A</label>
                    <input type="text" th:field="*{optionA}" placeholder="예: 🍗 평생 치킨만">
                    <p class="err" th:if="${#fields.hasErrors('optionA')}" th:errors="*{optionA}"></p>
                </div>
                <div class="field">
                    <label>선택지 B</label>
                    <input type="text" th:field="*{optionB}" placeholder="예: 🍕 평생 피자만">
                    <p class="err" th:if="${#fields.hasErrors('optionB')}" th:errors="*{optionB}"></p>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-primary btn-block">등록하기</button>
                    <a class="nav-link" th:href="@{/questions}">취소</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
