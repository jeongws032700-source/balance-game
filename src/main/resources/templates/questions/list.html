<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>밸런스 게임 · 질문 목록</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@1.3.9/dist/web/static/pretendard.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav th:replace="~{fragments/nav :: topnav}"></nav>

<div class="container">
    <!-- 히어로 -->
    <section class="hero">
        <div class="hero-row">
            <div>
                <h1>모든 밸런스 게임</h1>
                <p class="hero-sub">
                    지금 사람들이 가장 고민 중인 양자택일
                    <span th:text="${#lists.size(questions)}">0</span>개
                </p>
            </div>
            <a class="btn-ghost" th:href="@{/questions/new}">+ 질문 만들기</a>
        </div>
    </section>

    <!-- 그리드 -->
    <section class="grid">
        <p th:if="${#lists.isEmpty(questions)}" class="empty">아직 등록된 질문이 없어요. 첫 질문을 만들어보세요!</p>

        <a th:each="q : ${questions}" class="qcard" th:href="@{/questions/{id}(id=${q.id})}">
            <h3 class="qcard-q" th:text="${q.title}">질문</h3>

            <div class="splitbar">
                <div class="splitbar-a" th:style="'width:' + ${q.percentA} + '%'"></div>
                <div class="splitbar-b" th:style="'width:' + ${q.percentB} + '%'"></div>
            </div>

            <div class="opts">
                <div class="opt opt--a" th:classappend="${q.myChoice == 'A'} ? 'opt--mine'">
                    <span class="opt-top">
                        <span class="opt-label" th:text="${q.optionA}">A</span>
                        <span class="opt-check" th:if="${q.myChoice == 'A'}">✓</span>
                    </span>
                    <span class="opt-pct"><span th:text="${q.percentA}">0</span><small>%</small></span>
                </div>
                <div class="opt opt--b" th:classappend="${q.myChoice == 'B'} ? 'opt--mine'">
                    <span class="opt-top">
                        <span class="opt-label" th:text="${q.optionB}">B</span>
                        <span class="opt-check" th:if="${q.myChoice == 'B'}">✓</span>
                    </span>
                    <span class="opt-pct"><span th:text="${q.percentB}">0</span><small>%</small></span>
                </div>
            </div>

            <div class="qcard-foot">
                <span th:text="'👥 ' + ${q.total} + '명 참여'">👥 0명 참여</span>
                <span class="foot-cta" th:text="${q.voted} ? '결과 보기 →' : '투표하기 →'">투표하기 →</span>
            </div>
        </a>
    </section>
</div>
</body>
</html>
