<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${result.title} + ' · 밸런스 게임'">질문 · 밸런스 게임</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@1.3.9/dist/web/static/pretendard.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav th:replace="~{fragments/nav :: topnav}"></nav>

<div class="container">
    <div class="detail-wrap">
        <a class="back-link" th:href="@{/questions}">← 목록으로</a>

        <p th:if="${error}" class="flash" th:text="${error}">에러</p>

        <div class="qcard qcard--detail">
            <h1 class="detail-q" th:text="${result.title}">질문</h1>

            <div class="splitbar">
                <div class="splitbar-a" th:style="'width:' + ${result.percentA} + '%'"></div>
                <div class="splitbar-b" th:style="'width:' + ${result.percentB} + '%'"></div>
            </div>

            <!-- 로그인 + 미투표: 투표 버튼 -->
            <div th:if="${loggedIn and !result.voted}" class="opts">
                <form class="opt-form" method="post" th:action="@{/questions/{id}/vote(id=${result.id})}">
                    <input type="hidden" name="choice" value="A">
                    <button type="submit" class="opt opt--a">
                        <span class="opt-label" th:text="${result.optionA}">A</span>
                        <span class="opt-pct"><span th:text="${result.percentA}">0</span><small>%</small></span>
                    </button>
                </form>
                <form class="opt-form" method="post" th:action="@{/questions/{id}/vote(id=${result.id})}">
                    <input type="hidden" name="choice" value="B">
                    <button type="submit" class="opt opt--b">
                        <span class="opt-label" th:text="${result.optionB}">B</span>
                        <span class="opt-pct"><span th:text="${result.percentB}">0</span><small>%</small></span>
                    </button>
                </form>
            </div>

            <!-- 비로그인 or 이미 투표: 결과 표시 -->
            <div th:unless="${loggedIn and !result.voted}" class="opts">
                <div class="opt opt--a" th:classappend="${result.myChoice == 'A'} ? 'opt--mine'">
                    <span class="opt-top">
                        <span class="opt-label" th:text="${result.optionA}">A</span>
                        <span class="opt-check" th:if="${result.myChoice == 'A'}">✓</span>
                    </span>
                    <span class="opt-pct"><span th:text="${result.percentA}">0</span><small>%</small></span>
                </div>
                <div class="opt opt--b" th:classappend="${result.myChoice == 'B'} ? 'opt--mine'">
                    <span class="opt-top">
                        <span class="opt-label" th:text="${result.optionB}">B</span>
                        <span class="opt-check" th:if="${result.myChoice == 'B'}">✓</span>
                    </span>
                    <span class="opt-pct"><span th:text="${result.percentB}">0</span><small>%</small></span>
                </div>
            </div>

            <div class="qcard-foot">
                <span th:text="'👥 ' + ${result.total} + '명 참여'">👥 0명 참여</span>
                <span th:if="${result.voted}"
                      th:text="'내 선택: ' + (${result.myChoice == 'A'} ? ${result.optionA} : ${result.optionB})">내 선택</span>
            </div>
        </div>

        <p th:if="${!loggedIn}" class="hint" style="margin-top:18px">
            <a th:href="@{/login}">로그인</a> 후 투표할 수 있어요
        </p>
    </div>
</div>
</body>
</html>
