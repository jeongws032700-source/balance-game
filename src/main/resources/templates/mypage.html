<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마이페이지 · 밸런스 게임</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@1.3.9/dist/web/static/pretendard.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav th:replace="~{fragments/nav :: topnav}"></nav>

<div class="container">
    <div class="mypage-wrap">
        <p th:if="${error}" class="flash" th:text="${error}">알림</p>

        <!-- 내가 만든 질문 -->
        <section class="mypage-sec">
            <h2 class="sec-title">내가 만든 질문 <span th:text="${#lists.size(myQuestions)}">0</span></h2>
            <p th:if="${#lists.isEmpty(myQuestions)}" class="empty">아직 만든 질문이 없어요.</p>

            <div class="grid" th:unless="${#lists.isEmpty(myQuestions)}">
                <div th:each="q : ${myQuestions}" class="qcard qcard--static">
                    <a th:href="@{/questions/{id}(id=${q.id})}">
                        <h3 class="qcard-q" th:text="${q.title}">질문</h3>
                    </a>

                    <div class="splitbar">
                        <div class="splitbar-a" th:style="'width:' + ${q.percentA} + '%'"></div>
                        <div class="splitbar-b" th:style="'width:' + ${q.percentB} + '%'"></div>
                    </div>

                    <div class="opts">
                        <div class="opt opt--a" th:classappend="${q.myChoice == 'A'} ? 'opt--mine'">
                            <span class="opt-top">
                                <span class="opt-label" th:text="${q.optionA}">A</span>
                                <span class="opt-check" th:if="${q.myChoice == 'A'}">✓</span>
                            </span>
                            <span class="opt-pct"><span th:text="${q.percentA}">0</span><small>%</small></span>
                        </div>
                        <div class="opt opt--b" th:classappend="${q.myChoice == 'B'} ? 'opt--mine'">
                            <span class="opt-top">
                                <span class="opt-label" th:text="${q.optionB}">B</span>
                                <span class="opt-check" th:if="${q.myChoice == 'B'}">✓</span>
                            </span>
                            <span class="opt-pct"><span th:text="${q.percentB}">0</span><small>%</small></span>
                        </div>
                    </div>

                    <div class="qcard-foot">
                        <span th:text="'👥 ' + ${q.total} + '명 참여'">👥 0명 참여</span>
                        <span class="card-actions">
                            <a class="nav-link" th:href="@{/questions/{id}/edit(id=${q.id})}">수정</a>
                            <form th:action="@{/questions/{id}/delete(id=${q.id})}" method="post"
                                  style="display:inline"
                                  onsubmit="return confirm('이 질문을 삭제할까요? 투표 기록도 함께 삭제됩니다.');">
                                <button type="submit" class="link-danger">삭제</button>
                            </form>
                        </span>
                    </div>
                </div>
            </div>
        </section>

        <!-- 내가 투표한 질문 -->
        <section class="mypage-sec">
            <h2 class="sec-title">내가 투표한 질문 <span th:text="${#lists.size(votedQuestions)}">0</span></h2>
            <p th:if="${#lists.isEmpty(votedQuestions)}" class="empty">아직 투표한 질문이 없어요.</p>

            <div class="grid" th:unless="${#lists.isEmpty(votedQuestions)}">
                <a th:each="q : ${votedQuestions}" class="qcard" th:href="@{/questions/{id}(id=${q.id})}">
                    <h3 class="qcard-q" th:text="${q.title}">질문</h3>

                    <div class="splitbar">
                        <div class="splitbar-a" th:style="'width:' + ${q.percentA} + '%'"></div>
                        <div class="splitbar-b" th:style="'width:' + ${q.percentB} + '%'"></div>
                    </div>

                    <div class="opts">
                        <div class="opt opt--a" th:classappend="${q.myChoice == 'A'} ? 'opt--mine'">
                            <span class="opt-top">
                                <span class="opt-label" th:text="${q.optionA}">A</span>
                                <span class="opt-check" th:if="${q.myChoice == 'A'}">✓</span>
                            </span>
                            <span class="opt-pct"><span th:text="${q.percentA}">0</span><small>%</small></span>
                        </div>
                        <div class="opt opt--b" th:classappend="${q.myChoice == 'B'} ? 'opt--mine'">
                            <span class="opt-top">
                                <span class="opt-label" th:text="${q.optionB}">B</span>
                                <span class="opt-check" th:if="${q.myChoice == 'B'}">✓</span>
                            </span>
                            <span class="opt-pct"><span th:text="${q.percentB}">0</span><small>%</small></span>
                        </div>
                    </div>

                    <div class="qcard-foot">
                        <span th:text="'👥 ' + ${q.total} + '명 참여'">👥 0명 참여</span>
                        <span class="foot-cta">결과 보기 →</span>
                    </div>
                </a>
            </div>
        </section>
    </div>
</div>
</body>
</html>
