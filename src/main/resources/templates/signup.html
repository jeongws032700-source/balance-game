<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 · 밸런스 게임</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@1.3.9/dist/web/static/pretendard.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">
    <div class="auth-wrap">
        <a class="auth-brand" th:href="@{/questions}">
            <span class="brand-logo">B</span>
            <span class="brand-name">balance</span>
        </a>

        <div class="panel">
            <h2>회원가입</h2>
            <p class="panel-sub">밸런스 게임에 참여하려면 계정을 만드세요.</p>

            <form th:action="@{/signup}" th:object="${signupForm}" method="post">
                <div class="field">
                    <label>아이디</label>
                    <input type="text" th:field="*{username}" placeholder="3~50자">
                    <p class="err" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></p>
                </div>
                <div class="field">
                    <label>비밀번호</label>
                    <input type="password" th:field="*{password}" placeholder="4자 이상">
                    <p class="err" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></p>
                </div>
                <button type="submit" class="btn-primary btn-block">가입하기</button>
            </form>
        </div>

        <p class="auth-foot">이미 계정이 있나요? <a th:href="@{/login}">로그인</a></p>
    </div>
</div>
</body>
</html>
